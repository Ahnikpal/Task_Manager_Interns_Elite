<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional SaaS Todo List</title>
    <!-- Use Inter font for professional SaaS feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1 class="title">Tasks</h1>
            
            <div class="input-group">
                <input type="text" id="task-input" class="task-input" placeholder="Add a new task..." aria-label="Add a new task">
                <button id="add-btn" class="add-btn" aria-label="Add task">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </header>

        <main class="main-content">
            <ul id="task-list" class="task-list">
                <!-- Tasks will be dynamically injected here -->
            </ul>

            <div id="empty-state" class="empty-state">
                <div class="illustration">
                    <!-- Clean minimalist notebook/clipboard SVG -->
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        <line x1="9" y1="14" x2="15" y2="14"></line>
                        <line x1="9" y1="18" x2="15" y2="18"></line>
                        <line x1="9" y1="10" x2="11" y2="10"></line>
                    </svg>
                </div>
                <h2 class="empty-title">You have no tasks yet</h2>
                <p class="empty-subtitle">Get started by adding your first task above.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
